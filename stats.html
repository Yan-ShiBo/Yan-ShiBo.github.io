<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>访问统计 · 闫士博</title><link href="./resource/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
<script>(function(){var c=["https://busuanzi.icodeq.com/busuanzi.pure.mini.js","https://cdn.jsdelivr.net/gh/sukkaw/busuanzi@2.3/bsz.pure.mini.js","https://cdn.jsdelivr.net/npm/busuanzi@2.3.0"];(function l(i){if(i>=c.length)return;var s=document.createElement('script');s.async=true;s.src=c[i];s.onerror=function(){l(i+1)};document.head.appendChild(s)})(0)})();</script><script defer src="https://events.vercount.one/js"></script>
<style>:root{--bg:#f3f6ff;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}.topbar{position:sticky;top:0;background:rgba(15,23,42,.9)}.topbar-inner,.wrap{max-width:1080px;margin:0 auto;padding:0 14px}.topbar-inner{min-height:62px;display:flex;justify-content:space-between;align-items:center;gap:8px}.brand{color:#fff;font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.lang button{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#e5e7eb;padding:6px 11px;border-radius:999px;text-decoration:none;font-size:13px}.lang button.active{background:#fff;color:#111827}.wrap{padding:18px 14px 34px}.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.num{font-size:28px;font-weight:800;color:#1d4ed8}.muted{color:var(--muted)}.lang-section{display:none}.lang-section.active{display:block}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:640px){.nav{display:none}.grid{grid-template-columns:1fr}}</style></head>
<body><header class="topbar"><div class="topbar-inner"><div class="brand">访问统计 / Visitor Stats</div><nav class="nav"><a href="index.html">返回主页</a><a href="introduction.html">个人档案与荣誉</a><a href="resume_online.html">在线简历</a><a href="resume.html">PDF简历</a></nav><div class="lang"><button class="lang-btn active" data-lang="zh">中</button><button class="lang-btn" data-lang="en">EN</button></div></div></header>
<main class="wrap">
<section class="lang-section lang-zh active"><div class="card"><h1>访问统计</h1><p class="muted">本机数据保存在 localStorage，仅在你的浏览器中可见。</p><div class="grid"><div><div class="muted">本机访问次数</div><div id="local-visit-count" class="num">--</div></div><div><div class="muted">累计访问天数</div><div id="local-visit-days" class="num">--</div></div><div><div class="muted">本站PV / UV</div><div class="num"><span id="busuanzi_value_site_pv">--</span> / <span id="busuanzi_value_site_uv">--</span></div></div></div></div></section>
<section class="lang-section lang-en"><div class="card"><h1>Visitor Statistics</h1><p class="muted">Local counters are stored in your browser localStorage only.</p><div class="grid"><div><div class="muted">Local visits</div><div class="num" id="local-visit-count-en">--</div></div><div><div class="muted">Visited days</div><div class="num" id="local-visit-days-en">--</div></div><div><div class="muted">Site PV / UV</div><div class="num">(see Chinese tab)</div></div></div></div></section>
</main>
<script>
(function(){if(!window.localStorage)return;var TK='ysb_visit_total',FK='ysb_first_visit',LK='ysb_last_visit',DK='ysb_visit_days';function t(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function j(k,d){try{return JSON.parse(localStorage.getItem(k)||'')||d}catch(e){return d}}
function u(){var total=parseInt(localStorage.getItem(TK)||'0',10)+1;localStorage.setItem(TK,total);if(!localStorage.getItem(FK))localStorage.setItem(FK,new Date().toISOString());localStorage.setItem(LK,new Date().toISOString());var days=j(DK,[]),td=t();if(days.indexOf(td)<0){days.push(td);localStorage.setItem(DK,JSON.stringify(days));}
['local-visit-count','local-visit-count-en'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=total;});['local-visit-days','local-visit-days-en'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=days.length;});}
document.addEventListener('DOMContentLoaded',u);})();
window.addEventListener('DOMContentLoaded',function(){var b=document.querySelectorAll('.lang-btn'),s=document.querySelectorAll('.lang-section');function setL(l){s.forEach(function(x){x.classList.toggle('active',x.classList.contains('lang-'+l));});b.forEach(function(x){x.classList.toggle('active',x.dataset.lang===l);});}b.forEach(function(x){x.onclick=function(){setL(this.dataset.lang)};});setL('zh');});
</script>
