<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Home · 闫士博</title><link href="./resource/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
<style>body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f3f6ff;color:#1f2937}.topbar{position:sticky;top:0;background:rgba(15,23,42,.9)}.topbar-inner,.wrap{max-width:1080px;margin:0 auto;padding:0 14px}.topbar-inner{min-height:62px;display:flex;justify-content:space-between;align-items:center;gap:8px}.brand{color:#fff;font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.lang button{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#e5e7eb;padding:6px 11px;border-radius:999px;text-decoration:none;font-size:13px}.lang button.active{background:#fff;color:#111827}.wrap{padding:18px 14px 34px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.lang-section{display:none}.lang-section.active{display:block}canvas{width:260px;max-width:100%;height:auto}@media(max-width:640px){.nav{display:none}.card{grid-template-columns:1fr}}</style></head>

<script src="./resource/js/clock.js"></script><script>window.addEventListener('DOMContentLoaded',function(){var b=document.querySelectorAll('.lang-btn'),s=document.querySelectorAll('.lang-section');function setL(l){s.forEach(function(x){x.classList.toggle('active',x.classList.contains('lang-'+l));});b.forEach(function(x){x.classList.toggle('active',x.dataset.lang===l);});}b.forEach(function(x){x.onclick=function(){setL(this.dataset.lang);};});setL('zh');});</script>
