<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Home · 闫士博</title><link href="./resource/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
<style>:root{--bg:#f4f7ff;--card:#fff;--text:#1f2937;--muted:#667085;--border:#e4e7ec;--shadow:0 12px 28px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}.topbar{position:sticky;top:0;background:rgba(15,23,42,.9);z-index:40}.topbar-inner,.wrap{max-width:1120px;margin:0 auto;padding:0 16px}.topbar-inner{min-height:64px;display:flex;justify-content:space-between;align-items:center;gap:8px}.brand{color:#fff;font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.lang button{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#e5e7eb;padding:6px 12px;border-radius:999px;text-decoration:none;font-size:13px}.lang button.active{background:#fff;color:#111827}.wrap{padding:24px 16px 36px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:20px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.lang-section{display:none}.lang-section.active{display:block}p{color:var(--muted);line-height:1.7}canvas{width:260px;max-width:100%;height:auto}@media(max-width:640px){.nav{display:none}.card{grid-template-columns:1fr}}</style></head>
<body><header class="topbar"><div class="topbar-inner"><div class="brand">Home</div><nav class="nav"><a href="index.html">返回主页</a><a href="introduction.html">个人档案与荣誉</a><a href="resume_online.html">在线简历</a><a href="resume.html">PDF简历</a></nav><div class="lang"><button class="lang-btn active" data-lang="zh">中</button><button class="lang-btn" data-lang="en">EN</button></div></div></header>
<main class="wrap"><section class="lang-section lang-zh active"><div class="card"><div><h1>欢迎</h1><p>这是主页补充页，保持与全站一致的样式与导航。</p></div><canvas id="clock" width="260" height="260"></canvas></div></section><section class="lang-section lang-en"><div class="card"><div><h1>Welcome</h1><p>This supporting page follows the same style and navigation.</p></div><canvas id="clock-en" width="260" height="260"></canvas></div></section></main>
<script src="./resource/js/clock.js"></script><script>window.addEventListener('DOMContentLoaded',function(){var b=document.querySelectorAll('.lang-btn'),s=document.querySelectorAll('.lang-section');function setL(l){s.forEach(function(x){x.classList.toggle('active',x.classList.contains('lang-'+l));});b.forEach(function(x){x.classList.toggle('active',x.dataset.lang===l);});}b.forEach(function(x){x.onclick=function(){setL(this.dataset.lang);};});setL('zh');});</script>
</body></html>
