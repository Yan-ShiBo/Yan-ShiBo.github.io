<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>个人主页</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link href="Homepage_files/index.ico" rel="icon" type="image/x-icon">
    <link href="Homepage_files/index.ico" rel="shortcut icon" type="image/x-icon"/>

    <link href="./resource/css/ace.min.css" rel="stylesheet"/>
    <link href="./resource/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <link href="./resource/bootstrap-5.1.3-dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="./resource/jquery-3.5.1/jquery-3.5.1.min.js"></script>

    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --brand: #0d6efd;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --header-height: 68px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-rows: var(--header-height) 1fr;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 16px;
            background: linear-gradient(95deg, #0f172a, #111827 45%, #1f2937);
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(18px, 2.5vw, 28px);
            font-weight: 700;
            letter-spacing: 0.4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title .red { color: #ff5f6d; }

        .mobile-toggle {
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: none;
        }

        .content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 16px;
            padding: 16px;
        }

        .sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
            align-self: start;
            position: sticky;
            top: calc(var(--header-height) + 16px);
            max-height: calc(100vh - var(--header-height) - 32px);
            overflow: auto;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0 0 10px;
        }

        .nav-link {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            padding: 10px 12px;
            transition: all .2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #eef4ff;
            color: var(--brand);
            transform: translateX(2px);
        }

        .main {
            min-width: 0;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .workspace {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
            overflow: hidden;
        }

        #man {
            width: 100%;
            border: 0;
            min-height: calc(100vh - var(--header-height) - 130px);
        }

        @media (max-width: 992px) {
            .content {
                grid-template-columns: 1fr;
                padding: 12px;
                gap: 10px;
            }

            .mobile-toggle { display: inline-flex; align-items: center; justify-content: center; }

            .sidebar {
                position: static;
                max-height: none;
                display: none;
            }

            .sidebar.open { display: block; }

            .toolbar .btn {
                flex: 1 1 calc(50% - 4px);
                min-width: 150px;
            }

            #man {
                min-height: calc(100vh - var(--header-height) - 180px);
            }
        }

        @media (max-width: 576px) {
            .title .suffix { display: none; }
            .toolbar .btn { flex: 1 1 100%; }
        }
    </style>

    <script>
        function resizeIframe() {
            const iframe = document.getElementById('man');
            if (!iframe) return;
            let iframeDoc;
            try {
                iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            } catch (e) {
                return;
            }
            if (!iframeDoc) return;

            const body = iframeDoc.body;
            const html = iframeDoc.documentElement;
            const contentHeight = Math.max(
                body ? body.scrollHeight : 0,
                html ? html.scrollHeight : 0,
                500
            );
            iframe.style.height = contentHeight + 'px';
        }

        function setupNavigation() {
            const links = document.querySelectorAll('[data-nav]');
            const iframe = document.getElementById('man');
            const sidebar = document.getElementById('sidebar');

            links.forEach((link) => {
                link.addEventListener('click', () => {
                    links.forEach((item) => item.classList.remove('active'));
                    const key = link.getAttribute('data-nav');
                    document.querySelectorAll(`[data-nav="${key}"]`).forEach((item) => item.classList.add('active'));
                    if (window.innerWidth <= 992 && sidebar) {
                        sidebar.classList.remove('open');
                    }
                });
            });

            iframe.addEventListener('load', resizeIframe);
            window.addEventListener('resize', resizeIframe);

            const toggle = document.getElementById('mobile-toggle');
            if (toggle && sidebar) {
                toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
            }
        }

        window.addEventListener('load', () => {
            setupNavigation();
            resizeIframe();
        });
    </script>

        loadBusuanzi(0);
    })();

</head>
<body>

            <ul class="nav-list"><li><a class="nav-link" data-nav="resume-pdf" href="resume.html" target="main"><i class="fa fa-users"></i>resume(pdf)</a></li></ul>

            <ul class="nav-list"><li><a class="nav-link" data-nav="resume-web" href="resume_online.html" target="main"><i class="fa fa-id-card"></i>web resume</a></li></ul>

        <main class="main">
            <div class="toolbar">

                <a class="btn btn-outline-primary" data-nav="resume-pdf" href="resume.html" target="main"><i class="fa fa-users"></i> resume(pdf)</a>
                <a class="btn btn-info" data-nav="stats" href="stats.html" target="main"><i class="fa fa-bar-chart"></i> stats</a>
                <a class="btn btn-success" data-nav="resume-web" href="resume_online.html" target="main"><i class="fa fa-id-card"></i> web resume</a>

            <section class="workspace">
                <iframe id="man" name="main" src="introduction.html" title="Main content iframe"></iframe>
            </section>
        </main>
    </div>
</div>
