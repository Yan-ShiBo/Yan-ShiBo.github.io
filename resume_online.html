<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线简历 - 闫士博</title>
    <link href="./resource/bootstrap-5.1.3-dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="./resource/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg: #f3f7ff;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --border: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 0%, #dbeafe 0, transparent 35%),
                radial-gradient(circle at 95% 0%, #ede9fe 0, transparent 32%),
                var(--bg);
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 22px 12px 34px;
        }

        .quick-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .quick-nav a {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            padding: 20px;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(24px, 3.6vw, 36px);
            color: #1e3a8a;
            font-weight: 800;
        }

        .muted { color: var(--muted); line-height: 1.7; }

        .pill-row {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            border-radius: 999px;
            background: #eef2ff;
            border: 1px solid #dbeafe;
            padding: 6px 10px;
            font-size: 13px;
        }

        .resume-preview {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: block;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="quick-nav">
        <a href="index.html"><i class="fa fa-home"></i> 返回主页</a>
        <a href="introduction.html"><i class="fa fa-address-card"></i> 个人档案</a>
        <a href="resume.html"><i class="fa fa-file-pdf-o"></i> PDF 简历</a>
        <a href="stats.html"><i class="fa fa-bar-chart"></i> 访问统计</a>
    </div>

    <section class="card">
        <h1>在线简历</h1>
        <p class="muted">此页面用于快速浏览简历核心信息；如果需要下载或打印，请使用上方的 PDF 简历入口。</p>
        <div class="pill-row">
            <span class="pill">姓名：闫士博</span>
            <span class="pill">方向：大语言模型 / 数学推理</span>
            <span class="pill">邮箱：yanshibo2001@163.com</span>
        </div>
    </section>

    <section class="card">
        <h4 style="margin-top:0; color:#334155;">简历预览</h4>
        <img class="resume-preview" src="./Homepage_files/resume.jpg" alt="简历预览图"/>
    </section>
</div>
</body>
</html>
